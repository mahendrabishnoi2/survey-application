name: CI Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
       - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Checkstyle
        run: |
          cd backend-spring-boot
          ./mvnw checkstyle:check -q

      - name: ErrorProne (compile-time static analysis)
        run: |
          cd backend-spring-boot
          ./mvnw clean compile -q

      - name: SpotBugs
        run: |
          cd backend-spring-boot
          ./mvnw spotbugs:check -q

      - name: PMD
        run: |
          cd backend-spring-boot
          ./mvnw pmd:check -q

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Backend Tests
        run: |
          cd backend-spring-boot
          ./mvnw clean test

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend-angular/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend-angular
          npm install --legacy-peer-deps

      - name: ESLint
        run: |
          cd frontend-angular
          npm run lint

      - name: TypeScript type check
        run: |
          cd frontend-angular
          npm run typecheck

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend-angular/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend-angular
          npm install --legacy-peer-deps

      - name: Run Frontend Unit Tests
        run: |
          cd frontend-angular
          npm run test

      - name: Install Playwright Browsers
        run: |
          cd frontend-angular
          npx playwright install chromium --with-deps

      - name: Run Frontend E2E Tests
        run: |
          cd frontend-angular
          npm run e2e
